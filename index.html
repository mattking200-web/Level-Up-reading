<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Buddy Pro 📚</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root { --mint:#4ade80; --sky:#38bdf8; --bg:#f8fafc; --text:#1e293b; --error: #ef4444; }
        body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); padding:16px; display:flex; justify-content:center; }
        .card { background:#fff; border-radius:24px; padding:24px; box-shadow:0 10px 25px rgba(0,0,0,.05); width:100%; max-width:750px; border:1px solid #e2e8f0; }
        h1 { font-family:'Fredoka One',cursive; color: #16a34a; text-align:center; margin-bottom:10px; }
        .level-select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #cbd5e1; margin-bottom: 20px; font-size: 1rem; font-family: inherit; font-weight: bold; cursor: pointer; }
        .story-text { font-size:1.7rem; line-height:1.7; font-weight:700; margin-bottom:20px; text-align:center; min-height: 120px; padding: 10px; }
        .word { display:inline-block; margin-right:8px; color: #cbd5e1; border-bottom: 3px solid transparent; transition: all 0.2s; }
        .word.correct { color: #16a34a; border-bottom-color: var(--mint); }
        .mic-btn { font-family:'Fredoka One',cursive; padding:18px; border-radius:15px; border:none; cursor:pointer; font-size:1.2rem; width:100%; background:var(--sky); color:#fff; box-shadow: 0 4px 0 #0284c7; margin-bottom: 15px; }
        .mic-btn.listening { background:var(--error); box-shadow: 0 4px 0 #b91c1c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }
        .transcript-box { margin-top: 10px; padding: 15px; background: #f1f5f9; border-radius: 12px; border: 2px solid #e2e8f0; min-height: 50px; font-size: 1.1rem; color: #64748b; }
        .quiz-area { margin-top:20px; padding-top:20px; border-top:2px dashed #e2e8f0; }
        .opt-btn { display:block; width:100%; padding:14px; margin:8px 0; border:2px solid #e2e8f0; border-radius:12px; background:#fff; font-weight:700; cursor:pointer; text-align:left; font-family: inherit; }
        .next-btn { background:var(--mint); color:#fff; margin-top:15px; display:none; font-family:'Fredoka One',cursive; padding:18px; border-radius:15px; border:none; width:100%; cursor:pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Reading Buddy Pro 📚</h1>
    
    <select id="lvl-select" class="level-select" onchange="changeLevel()">
        <option value="AA">Level AA: One Word Focus</option>
        <option value="A">Level A: 3-5 Word Patterns</option>
        <option value="B">Level B: Predictable Sentences</option>
        <option value="C">Level C: Pattern Breaks</option>
        <option value="D">Level D: Natural Sentences (5-8 words)</option>
        <option value="E">Level E: Compound (And/But)</option>
        <option value="F">Level F: Dialogue ("She said")</option>
        <option value="G">Level G: Smaller Text / Re-reading</option>
    </select>

    <h2 id="story-title" style="text-align:center; color:var(--sky); margin:0;"></h2>
    <div id="story-display" class="story-text"></div>
    
    <button id="mic-btn" class="mic-btn" onclick="toggleMic()">Click to Start Reading 🎤</button>
    
    <div class="transcript-box">
        <b>Listening Log:</b><br>
        <span id="live-transcript">Ready for you...</span>
    </div>

    <div id="quiz-area" class="quiz-area" style="display:none;"></div>
    <button id="next-story-btn" class="next-btn" onclick="nextStory()">Next Story ➡️</button>
</div>

<script>
const ALL_STORIES = {
    AA: [
        { title: "The Farm", text: "Cow. Horse. Pig. Sheep. Farm.", q: [{q:"What is this about?", opts:["The Farm","The City"], a:0}] }
    ],
    A: [
        { title: "I See", text: "I see the cat. I see the dog. I see the bird.", q: [{q:"What is repetitive?", opts:["I see the","Look at"], a:0}] }
    ],
    B: [
        { title: "My Clothes", text: "I put on my shirt. I put on my pants. I put on my hat.", q: [{q:"Is the pattern predictable?", opts:["Yes","No"], a:0}] }
    ],
    C: [
        { title: "A Snack", text: "I am hungry today. I want a red apple. I want a yellow banana. It is time to eat.", q: [{q:"Did the pattern break?", opts:["Yes","No"], a:0}] }
    ],
    D: [
        { title: "Busy Bees", text: "Bees fly to the flowers. They get nectar to make honey. Do not bother them!", q: [{q:"How many words per sentence?", opts:["2-3","5-8"], a:1}] }
    ],
    E: [
        { title: "The Turtle", text: "The turtle walks to the pond and it swims. It is slow but it is safe.", q: [{q:"Which connector was used?", opts:["And / But","Because"], a:0}] }
    ],
    F: [
        { title: "The Fire", text: "'Get ready!' said the firefighter. He used a long hose to stop the hot fire.", q: [{q:"Who spoke in the story?", opts:["The firefighter","The dog"], a:0}] }
    ],
    G: [
        { title: "The Garden", text: "Last week, we planted a vegetable garden behind the shed. We had to dig deep in the soil before we could drop the tiny seeds. If we don't water them every morning, they will not grow. It takes a long time to see the green sprouts.", q: [{q: "Where is the garden?", opts: ["In the front", "Behind the shed"], a: 1}, {q: "What do the seeds need?", opts: ["Water", "Sand"], a: 0}] }
    ]
};

let currentLevel = "AA";
let storyIdx = 0;
let recognition;
let isReading = false;
let cleanTargetWords = [];
let finalTranscript = ""; 

function changeLevel() {
    currentLevel = document.getElementById('lvl-select').value;
    storyIdx = 0;
    loadStory();
}

function loadStory() {
    const story = ALL_STORIES[currentLevel][storyIdx];
    document.getElementById('story-title').innerText = story.title;
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('next-story-btn').style.display = 'none';
    document.getElementById('live-transcript').innerHTML = "Ready...";
    
    finalTranscript = ""; 
    const words = story.text.split(/\s+/);
    cleanTargetWords = words.map(w => w.replace(/[^\w]/g, "").toLowerCase());
    
    document.getElementById('story-display').innerHTML = words.map((w, i) => 
        `<span id="word-${i}" class="word">${w}</span>`
    ).join(' ');
}

function initSpeech() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new Speech();
    recognition.continuous = true;
    recognition.interimResults = true;
    
    recognition.onresult = (event) => {
        let interimTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + " ";
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        
        const fullSpokenText = (finalTranscript + interimTranscript).toLowerCase();
        document.getElementById('live-transcript').innerText = fullSpokenText; 
        
        const spokenWords = fullSpokenText.split(/\s+/).map(s => s.replace(/[^\w]/g, ""));
        let currentTargetIndex = 0;

        // Sequence Matching (Non-Greedy)
        spokenWords.forEach(spoken => {
            if (!spoken) return;
            // Check if this spoken word matches the next expected target word
            for (let i = currentTargetIndex; i < cleanTargetWords.length; i++) {
                if (isMatch(spoken, cleanTargetWords[i])) {
                    document.getElementById(`word-${i}`).className = "word correct";
                    currentTargetIndex = i + 1; // Advance pointer so we don't highlight backward
                    break;
                }
            }
        });
    };

    recognition.onend = () => { if (isReading) recognition.start(); };
}

function toggleMic() {
    if (!recognition) initSpeech();
    if (isReading) {
        isReading = false;
        recognition.stop();
        document.getElementById('mic-btn').innerText = "Click to Start Reading 🎤";
        document.getElementById('mic-btn').classList.remove('listening');
        showResults();
    } else {
        isReading = true;
        finalTranscript = ""; 
        loadStory(); 
        recognition.start();
        document.getElementById('mic-btn').innerText = "Listening... Click to Stop";
        document.getElementById('mic-btn').classList.add('listening');
    }
}

function isMatch(s, t) {
    if (!s || !t) return false;
    if (t.length <= 3) return s === t; 
    return s.includes(t) || t.includes(s) || (t.length > 5 && s.startsWith(t.substring(0,4)));
}

function showResults() {
    const quizArea = document.getElementById('quiz-area');
    const story = ALL_STORIES[currentLevel][storyIdx];
    quizArea.innerHTML = "<h3>Quick Quiz!</h3>";
    
    story.q.forEach((qObj) => {
        const div = document.createElement('div');
        div.innerHTML = `<p><b>${qObj.q}</b></p>`;
        qObj.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => {
                const buttons = div.querySelectorAll('.opt-btn');
                buttons.forEach(b => b.disabled = true);
                btn.style.background = (i === qObj.a) ? "#dcfce7" : "#fee2e2";
            };
            div.appendChild(btn);
        });
        quizArea.appendChild(div);
    });
    
    quizArea.style.display = 'block';
    document.getElementById('next-story-btn').style.display = 'block';
}

function nextStory() {
    storyIdx = (storyIdx + 1) % ALL_STORIES[currentLevel].length;
    loadStory();
}

loadStory();
</script>
</body>
</html>
