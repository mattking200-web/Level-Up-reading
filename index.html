<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Buddy 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#4ade80; --mint-dark:#16a34a; --sky:#38bdf8; --sky-dark:#0284c7;
  --bg:#f0fdf4; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); padding:16px;}
.container{max-width:700px; margin:0 auto;}
.card{background:#fff; border-radius:24px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,.1); border:2px solid var(--border); margin-bottom:20px;}
h1{font-family:'Fredoka One',cursive; color:var(--mint-dark); text-align:center; margin-bottom:20px;}
.stats{display:flex; justify-content:space-between; margin-bottom:20px; font-weight:800; background:#f8fafc; padding:10px; border-radius:12px;}
.story-text{font-size:1.6rem; line-height:1.8; font-weight:700; margin-bottom:20px; text-align:center;}
.word{display:inline-block; margin-right:6px; transition: color 0.3s;}
.word.correct{color: #16a34a;}
.btn{font-family:'Fredoka One',cursive; padding:15px 25px; border-radius:15px; border:none; cursor:pointer; font-size:1.1rem; width:100%; transition: 0.2s;}
.btn-mic{background:var(--sky); color:#fff; margin-bottom:10px;}
.btn-mic.listening{background:#ef4444; animation: pulse 1.5s infinite;}
.btn-next{background:var(--mint); color:#fff; display:none;}
@keyframes pulse{ 0%{opacity:1;} 50%{opacity:0.7;} 100%{opacity:1;} }
.quiz-section{margin-top:20px; border-top:2px dashed #e2e8f0; padding-top:20px;}
.opt-btn{display:block; width:100%; padding:10px; margin:5px 0; border:2px solid #e2e8f0; border-radius:10px; background:#fff; font-weight:700; cursor:pointer; text-align:left;}
.opt-btn.correct-choice{background:#dcfce7; border-color:#22c55e;}
.opt-btn.wrong-choice{background:#fee2e2; border-color:#f87171;}
</style>
</head>
<body>

<div class="container">
    <h1>Reading Buddy 📚</h1>

    <div class="card">
        <div class="stats">
            <div>Level: <span id="lvl-display">AA</span></div>
            <div>Progress: <span id="streak-display">0</span>/2</div>
        </div>

        <div id="setup-view">
            <label><b>Select Level:</b></label>
            <select id="lvl-select" style="width:100%; padding:10px; margin:10px 0; border-radius:10px;"></select>
            <button class="btn btn-mic" onclick="startApp()">Start Reading 🚀</button>
        </div>

        <div id="reading-view" style="display:none;">
            <h2 id="story-title" style="text-align:center; color:var(--sky-dark);"></h2>
            <div id="story-display" class="story-text"></div>
            
            <button id="mic-btn" class="btn btn-mic" onclick="toggleMic()">Click to Speak 🎤</button>
            <div id="accuracy-display" style="text-align:center; font-weight:900; margin:10px; font-size:1.2rem;"></div>
            <button id="next-btn" class="btn btn-next" onclick="nextStory()">Next Story ➡️</button>
        </div>

        <div id="quiz-view" class="quiz-section" style="display:none;"></div>
    </div>
</div>

<script>
const STORIES = {
  AA: [
    { title:"The Cat", text:"I see a cat. The cat is big. I like the cat.", q:[{q:"What does the child see?",opts:["A dog","A cat","A bird"],a:1},{q:"What size is the cat?",opts:["Small","Tiny","Big"],a:2},{q:"How does the child feel?",opts:["Loves it","Fears it","Ignores it"],a:0}] },
    { title:"My Dog", text:"My dog is red. My dog can run. I love my dog.", q:[{q:"What color is the dog?",opts:["Blue","Red","Green"],a:1},{q:"What can the dog do?",opts:["Fly","Run","Sing"],a:1},{q:"How does the child feel?",opts:["Loves dog","Scared","Sad"],a:0}] }
  ],
  A: [
    { title:"I Can Jump", text:"I can jump. I can run. I can play. It is fun.", q:[{q:"What can the child do?",opts:["Swim","Jump","Fly"],a:1},{q:"How is playing?",opts:["Hard","Boring","Fun"],a:2},{q:"What is another action?",opts:["Sleep","Run","Eat"],a:1}] }
  ]
};

let currentLevel = "AA";
let storyIdx = 0;
let streak = 0;
let recognition;
let isListening = false;
let spokenWords = new Set();

// Setup Levels
const select = document.getElementById('lvl-select');
Object.keys(STORIES).forEach(lvl => {
    let opt = document.createElement('option');
    opt.value = lvl; opt.textContent = "Level " + lvl;
    select.appendChild(opt);
});

function startApp() {
    currentLevel = select.value;
    storyIdx = 0;
    streak = 0;
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('reading-view').style.display = 'block';
    loadStory();
}

function loadStory() {
    const story = STORIES[currentLevel][storyIdx];
    document.getElementById('story-title').textContent = story.title;
    document.getElementById('lvl-display').textContent = currentLevel;
    document.getElementById('streak-display').textContent = streak;
    document.getElementById('accuracy-display').textContent = "";
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('mic-btn').style.display = 'block';
    
    spokenWords.clear();
    const display = document.getElementById('story-display');
    display.innerHTML = story.text.split(' ').map((w, i) => `<span id="word-${i}" class="word">${w}</span>`).join(' ');
}

function toggleMic() {
    if (!recognition) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new Speech();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript.toLowerCase();
            }
            checkText(transcript);
        };
    }

    if (isListening) {
        recognition.stop();
        isListening = false;
        document.getElementById('mic-btn').className = "btn btn-mic";
        document.getElementById('mic-btn').textContent = "Click to Speak 🎤";
        finishReading();
    } else {
        recognition.start();
        isListening = true;
        document.getElementById('mic-btn').className = "btn btn-mic listening";
        document.getElementById('mic-btn').textContent = "Stop & Check ⏹️";
    }
}

function checkText(transcript) {
    const story = STORIES[currentLevel][storyIdx];
    const storyWords = story.text.toLowerCase().replace(/[.,!?;]/g, '').split(' ');
    const spokenArray = transcript.replace(/[.,!?;]/g, '').split(/\s+/);

    storyWords.forEach((word, i) => {
        // Strict word-for-word check
        if (spokenArray.includes(word)) {
            document.getElementById(`word-${i}`).classList.add('correct');
            spokenWords.add(i);
        }
    });
}

function finishReading() {
    const story = STORIES[currentLevel][storyIdx];
    const totalWords = story.text.split(' ').length;
    const accuracy = Math.round((spokenWords.size / totalWords) * 100);
    
    const display = document.getElementById('accuracy-display');
    display.textContent = `Accuracy: ${accuracy}%`;

    if (accuracy >= 80) {
        streak++;
        display.innerHTML += "<br>🌟 Great Reading!";
        if (streak >= 2) {
            levelUp();
        }
    } else {
        streak = 0;
        display.innerHTML += "<br>📚 Try to read every word!";
    }
    
    document.getElementById('streak-display').textContent = streak;
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
    showQuiz();
}

function showQuiz() {
    const quizView = document.getElementById('quiz-view');
    quizView.innerHTML = "<h3>Comprehension Quiz</h3>";
    quizView.style.display = 'block';
    
    const story = STORIES[currentLevel][storyIdx];
    story.q.forEach((qObj, qIndex) => {
        const qDiv = document.createElement('div');
        qDiv.innerHTML = `<p><b>${qIndex + 1}. ${qObj.q}</b></p>`;
        qObj.opts.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.textContent = opt;
            btn.onclick = () => {
                if (oIdx === qObj.a) {
                    btn.classList.add('correct-choice');
                } else {
                    btn.classList.add('wrong-choice');
                }
                const siblings = qDiv.querySelectorAll('button');
                siblings.forEach(b => b.disabled = true);
            };
            qDiv.appendChild(btn);
        });
        quizView.appendChild(qDiv);
    });
}

function nextStory() {
    storyIdx++;
    if (storyIdx >= STORIES[currentLevel].length) {
        storyIdx = 0; // Loop stories within level
    }
    loadStory();
}

function levelUp() {
    const levels = Object.keys(STORIES);
    let currentIdx = levels.indexOf(currentLevel);
    if (currentIdx < levels.length - 1) {
        currentLevel = levels[currentIdx + 1];
        streak = 0;
        storyIdx = 0;
        alert("🎉 Congratulations! You reached Level " + currentLevel);
    }
}
</script>
</body>
</html>
