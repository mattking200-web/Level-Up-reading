<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Buddy 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#4ade80; --mint-dark:#16a34a; --sky:#38bdf8; --sky-dark:#0284c7;
  --bg:#f0fdf4; --text:#1e293b; --border:#e2e8f0; --error: #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); padding:16px;}
.container{max-width:700px; margin:0 auto;}
.card{background:#fff; border-radius:24px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,.1); border:2px solid var(--border); margin-bottom:20px;}
h1{font-family:'Fredoka One',cursive; color:var(--mint-dark); text-align:center; margin-bottom:20px;}
.stats{display:flex; justify-content:space-between; margin-bottom:20px; font-weight:800; background:#f8fafc; padding:10px; border-radius:12px;}
.story-text{font-size:1.8rem; line-height:1.8; font-weight:700; margin-bottom:20px; text-align:center;}
.word{display:inline-block; margin-right:8px; color: #cbd5e1; transition: 0.2s;}
.word.correct{color: var(--mint-dark); text-shadow: 1px 1px #dcfce7;}
.word.wrong{color: var(--error); text-decoration: underline wavy var(--error);}
.btn{font-family:'Fredoka One',cursive; padding:15px 25px; border-radius:15px; border:none; cursor:pointer; font-size:1.1rem; width:100%; transition: 0.2s;}
.btn-mic{background:var(--sky); color:#fff; margin-bottom:10px;}
.btn-mic.listening{background:var(--error); animation: pulse 1.5s infinite;}
.btn-next{background:var(--mint); color:#fff; display:none;}
@keyframes pulse{ 0%{opacity:1;} 50%{opacity:0.7;} 100%{opacity:1;} }
.quiz-section{margin-top:20px; border-top:2px dashed #e2e8f0; padding-top:20px;}
.opt-btn{display:block; width:100%; padding:12px; margin:8px 0; border:2px solid #e2e8f0; border-radius:12px; background:#fff; font-weight:700; cursor:pointer; text-align:left;}
.opt-btn.correct-choice{background:#dcfce7; border-color:#22c55e; color:#166534;}
.opt-btn.wrong-choice{background:#fee2e2; border-color:#f87171; color:#991b1b;}
</style>
</head>
<body>

<div class="container">
    <h1>Reading Buddy 📚</h1>
    <div class="card">
        <div class="stats">
            <div>Level: <span id="lvl-display">AA</span></div>
            <div>Streak: <span id="streak-display">0</span>/2</div>
        </div>

        <div id="setup-view">
            <label><b>Select Level:</b></label>
            <select id="lvl-select" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; font-size:1rem;"></select>
            <button class="btn btn-mic" onclick="startApp()">Start Reading 🚀</button>
        </div>

        <div id="reading-view" style="display:none;">
            <h2 id="story-title" style="text-align:center; color:var(--sky-dark); margin-bottom:10px;"></h2>
            <div id="story-display" class="story-text"></div>
            <button id="mic-btn" class="btn btn-mic" onclick="toggleMic()">Click to Speak 🎤</button>
            <div id="accuracy-display" style="text-align:center; font-weight:900; margin:10px;"></div>
            <button id="next-btn" class="btn btn-next" onclick="nextStory()">Next Story ➡️</button>
        </div>
        <div id="quiz-view" class="quiz-section" style="display:none;"></div>
    </div>
</div>

<script>
const STORIES = {
  AA: [
    { title:"The Cat", text:"I see a cat. The cat is big. I like the cat.", q:[{q:"What does the child see?",opts:["A dog","A cat","A bird"],a:1},{q:"What size is the cat?",opts:["Small","Tiny","Big"],a:2},{q:"How does the child feel?",opts:["Hates it","Likes it","Is scared"],a:1}] },
    { title:"My Dog", text:"My dog is red. My dog can run. I love my dog.", q:[{q:"What color is the dog?",opts:["Blue","Red","Green"],a:1},{q:"What can the dog do?",opts:["Fly","Run","Sing"],a:1},{q:"How does the child feel?",opts:["Loves it","Hates it","Is scared"],a:0}] },
    { title:"The Sun", text:"The sun is up. I see the sun. It is hot.", q:[{q:"Where is the sun?",opts:["Down","Hidden","Up"],a:2},{q:"What is the sun like?",opts:["Cold","Wet","Hot"],a:2},{q:"What does the child see?",opts:["The sun","The moon","A star"],a:0}] },
    { title:"The Ball", text:"I have a ball. The ball is red. I kick the ball.", q:[{q:"What does the child have?",opts:["A bat","A ball","A kite"],a:1},{q:"What color is the ball?",opts:["Green","Blue","Red"],a:2},{q:"What does the child do?",opts:["Throws it","Kicks it","Drops it"],a:1}] },
    { title:"My Mom", text:"I see my mom. My mom is big. I love my mom.", q:[{q:"Who does the child see?",opts:["Dad","Teacher","Mom"],a:2},{q:"How is the mom described?",opts:["Small","Big","Fast"],a:1},{q:"How does the child feel?",opts:["Loves mom","Fears mom","Misses mom"],a:0}] }
  ],
  A: [
    { title:"I Can Jump", text:"I can jump. I can run. I can play. It is fun.", q:[{q:"What can the child do?",opts:["Swim","Jump","Fly"],a:1},{q:"How is playing?",opts:["Hard","Boring","Fun"],a:2},{q:"What is another action?",opts:["Sleep","Run","Eat"],a:1}] },
    { title:"The Big Box", text:"I see a big box. The box is red. I put toys in the box.", q:[{q:"What size is the box?",opts:["Tiny","Big","Short"],a:1},{q:"What color is it?",opts:["Red","Blue","Green"],a:0},{q:"What goes inside?",opts:["Books","Toys","Food"],a:1}] },
    { title:"My Hat", text:"I have a hat. My hat is blue. I go out to play.", q:[{q:"What does the child have?",opts:["A hat","A coat","A bag"],a:0},{q:"What color is it?",opts:["Red","Green","Blue"],a:2},{q:"Where do they go?",opts:["To bed","To school","Out to play"],a:2}] },
    { title:"The Hen", text:"I see a hen. The hen is in the pen. The hen has eggs.", q:[{q:"Where is the hen?",opts:["In the barn","In the pen","In the tree"],a:1},{q:"What does the hen have?",opts:["Chicks","Feathers","Eggs"],a:2},{q:"What animal is it?",opts:["A duck","A hen","A pig"],a:1}] },
    { title:"The Pig", text:"The pig is fat. The pig can dig. The pig is in the mud.", q:[{q:"What does the pig look like?",opts:["Thin","Fat","Small"],a:1},{q:"What can it do?",opts:["Fly","Dig","Sing"],a:1},{q:"Where is the pig?",opts:["In the grass","In the mud","In the water"],a:1}] }
  ],
  B: [
    { title:"At the Park", text:"I like to go to the park. I can play on the slide. The slide is very fast.", q:[{q:"Where does the child go?",opts:["The store","The park","School"],a:1},{q:"What can they play on?",opts:["The slide","The swings","The bike"],a:0},{q:"How is the slide?",opts:["Slow","Fast","Cold"],a:1}] },
    { title:"The Little Bird", text:"A little bird is in the tree. It is blue and yellow. The bird can sing a song.", q:[{q:"Where is the bird?",opts:["In the house","In the tree","In the water"],a:1},{q:"What colors is the bird?",opts:["Red and black","Blue and yellow","Green and white"],a:1},{q:"What can the bird do?",opts:["Sing a song","Fly a kite","Dig a hole"],a:0}] },
    { title:"Fishing", text:"We go to the lake to fish. My dad has a big boat. We catch a little fish.", q:[{q:"Where do they go?",opts:["The ocean","The park","The lake"],a:2},{q:"What size is the boat?",opts:["Small","Big","Red"],a:1},{q:"What do they catch?",opts:["A big fish","A frog","A little fish"],a:2}] },
    { title:"The Blue Bike", text:"I have a new blue bike. I wear my helmet to be safe. I can ride fast.", q:[{q:"What color is the bike?",opts:["Red","Blue","Green"],a:1},{q:"Why do they wear a helmet?",opts:["To look cool","To be safe","To keep warm"],a:1},{q:"How can they ride?",opts:["Slow","Fast","Side ways"],a:1}] },
    { title:"My School", text:"I go to school every day. My teacher is very nice. I like to read books.", q:[{q:"How often do they go to school?",opts:["Every day","Sometimes","On Mondays"],a:0},{q:"How is the teacher?",opts:["Mean","Nice","Tall"],a:1},{q:"What do they like to do?",opts:["Play tag","Read books","Paint"],a:1}] }
  ],
  C: [
    { title:"The Tall Giraffe", text:"The giraffe is very tall. It has a long neck to eat leaves. It lives in the zoo.", q:[{q:"What is the giraffe like?",opts:["Short","Tall","Fat"],a:1},{q:"Why is its neck long?",opts:["To see far","To eat leaves","To drink water"],a:1},{q:"Where does it live?",opts:["In a house","In the zoo","On a farm"],a:1}] },
    { title:"My Garden", text:"I planted seeds in the dirt. I give them water every day. Soon I will see green plants.", q:[{q:"What was planted?",opts:["Flowers","Trees","Seeds"],a:2},{q:"What do the seeds need every day?",opts:["Food","Water","Toys"],a:1},{q:"What color will the plants be?",opts:["Red","Blue","Green"],a:2}] },
    { title:"A Rainy Day", text:"The rain is falling down fast. I wear my yellow coat and boots. I like to jump in the water.", q:[{q:"What is the weather like?",opts:["Sunny","Snowy","Rainy"],a:2},{q:"What color is the coat?",opts:["Blue","Yellow","Green"],a:1},{q:"What does the child like to do?",opts:["Jump in water","Run fast","Sleep"],a:0}] },
    { title:"Helping Dad", text:"My dad is making a big cake. I help him stir the eggs. It smells very good in the kitchen.", q:[{q:"What is Dad making?",opts:["Bread","Cookies","A cake"],a:2},{q:"How does the child help?",opts:["Eating","Stirring eggs","Cleaning"],a:1},{q:"Where are they?",opts:["In the garden","In the kitchen","In the car"],a:1}] },
    { title:"The Night Sky", text:"The moon is bright in the sky. I can see many stars tonight. I go to bed and dream.", q:[{q:"What is bright in the sky?",opts:["The sun","The moon","A plane"],a:1},{q:"What else can they see?",opts:["Stars","Clouds","Birds"],a:0},{q:"What do they do at the end?",opts:["Play","Eat","Go to bed"],a:2}] }
  ]
};

let currentLevel = "AA", storyIdx = 0, streak = 0, recognition, isListening = false;
let pointer = 0, correctCount = 0, processedWordCount = 0;

const select = document.getElementById('lvl-select');
Object.keys(STORIES).forEach(lvl => {
    let opt = document.createElement('option'); opt.value = lvl; opt.textContent = "Level " + lvl; select.appendChild(opt);
});

function startApp() {
    currentLevel = select.value; storyIdx = 0; streak = 0;
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('reading-view').style.display = 'block';
    loadStory();
}

function loadStory() {
    const story = STORIES[currentLevel][storyIdx];
    document.getElementById('story-title').textContent = story.title;
    document.getElementById('lvl-display').textContent = currentLevel;
    document.getElementById('streak-display').textContent = streak;
    document.getElementById('accuracy-display').textContent = "";
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('mic-btn').style.display = 'block';
    
    pointer = 0; correctCount = 0; processedWordCount = 0;
    const display = document.getElementById('story-display');
    display.innerHTML = story.text.split(' ').map((w, i) => `<span id="word-${i}" class="word">${w}</span>`).join(' ');
}

function toggleMic() {
    if (!recognition) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new Speech();
        recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let fullTranscript = "";
            for (let i = 0; i < event.results.length; i++) {
                fullTranscript += event.results[i][0].transcript.toLowerCase() + " ";
            }
            const spokenArray = fullTranscript.trim().replace(/[.,!?;]/g, '').split(/\s+/);
            
            while (processedWordCount < spokenArray.length) {
                processSingleWord(spokenArray[processedWordCount]);
                processedWordCount++;
            }
        };
    }

    if (isListening) {
        recognition.stop(); isListening = false;
        document.getElementById('mic-btn').className = "btn btn-mic";
        document.getElementById('mic-btn').textContent = "Click to Speak 🎤";
        finishReading();
    } else {
        recognition.start(); isListening = true;
        document.getElementById('mic-btn').className = "btn btn-mic listening";
        document.getElementById('mic-btn').textContent = "Stop & Check ⏹️";
    }
}

function processSingleWord(spoken) {
    const storyWords = STORIES[currentLevel][storyIdx].text.toLowerCase().replace(/[.,!?;]/g, '').split(' ');
    if (pointer >= storyWords.length) return;

    if (spoken === storyWords[pointer]) {
        markWord(pointer, 'correct'); pointer++; correctCount++;
    } 
    else if (pointer + 1 < storyWords.length && spoken === storyWords[pointer + 1]) {
        markWord(pointer, 'wrong'); markWord(pointer + 1, 'correct'); pointer += 2; correctCount++;
    }
}

function markWord(idx, status) {
    const el = document.getElementById(`word-${idx}`);
    if (el && !el.classList.contains('correct') && !el.classList.contains('wrong')) {
        el.classList.add(status);
    }
}

function finishReading() {
    const story = STORIES[currentLevel][storyIdx];
    const words = story.text.split(' ');
    for (let i = pointer; i < words.length; i++) markWord(i, 'wrong');
    const accuracy = Math.round((correctCount / words.length) * 100);
    const display = document.getElementById('accuracy-display');
    display.textContent = `Accuracy: ${accuracy}%`;

    if (accuracy >= 80) { streak++; display.innerHTML += "<br>🌟 Nice Reading!"; }
    else { streak = 0; display.innerHTML += "<br>📚 Try again for a streak!"; }
    
    document.getElementById('streak-display').textContent = streak;
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
    
    if (streak >= 2) levelUp();
    showQuiz();
}

function showQuiz() {
    const quizView = document.getElementById('quiz-view');
    quizView.innerHTML = "<h3>Story Questions</h3>";
    quizView.style.display = 'block';
    const story = STORIES[currentLevel][storyIdx];
    story.q.forEach((qObj, qi) => {
        const div = document.createElement('div');
        div.innerHTML = `<p><b>${qi+1}. ${qObj.q}</b></p>`;
        qObj.opts.forEach((opt, oi) => {
            const b = document.createElement('button'); b.className="opt-btn"; b.textContent = opt;
            b.onclick = () => {
                const btns = div.querySelectorAll('button');
                btns.forEach(btn => btn.disabled = true);
                if (oi === qObj.a) b.classList.add('correct-choice');
                else { b.classList.add('wrong-choice'); btns[qObj.a].classList.add('correct-choice'); }
            };
            div.appendChild(b);
        });
        quizView.appendChild(div);
    });
}

function nextStory() {
    storyIdx = (storyIdx + 1) % STORIES[currentLevel].length;
    loadStory();
}

function levelUp() {
    const lvls = Object.keys(STORIES);
    let idx = lvls.indexOf(currentLevel);
    if (idx < lvls.length - 1) {
        currentLevel = lvls[idx + 1]; streak = 0; storyIdx = 0;
        setTimeout(() => alert("🎉 AMAZING! You reached Level " + currentLevel), 500);
    }
}
</script>
</body>
</html>
