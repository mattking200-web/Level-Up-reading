<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Buddy 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root { --mint:#4ade80; --sky:#38bdf8; --bg:#f0fdf4; --text:#1e293b; --error: #ef4444; }
body{font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); padding:16px; display:flex; justify-content:center;}
.card{background:#fff; border-radius:24px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,.1); width:100%; max-width:600px; border:2px solid #e2e8f0;}
h1{font-family:'Fredoka One',cursive; color: #16a34a; text-align:center; margin-bottom:20px;}
.story-text{font-size:1.8rem; line-height:1.6; font-weight:700; margin-bottom:20px; text-align:center;}
.word{display:inline-block; margin-right:8px; color: #cbd5e1; border-bottom: 3px solid transparent;}
.word.correct{color: #16a34a; border-bottom-color: var(--mint);}
.word.wrong{color: var(--error); text-decoration: underline wavy var(--error);}
.mic-btn{font-family:'Fredoka One',cursive; padding:20px; border-radius:15px; border:none; cursor:pointer; font-size:1.2rem; width:100%; background:var(--sky); color:#fff; box-shadow: 0 4px 0 #0284c7;}
.mic-btn.listening{background:var(--error); box-shadow: 0 4px 0 #b91c1c;}
.transcript-box {margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; border: 2px solid #cbd5e1; min-height: 80px; font-size: 1.1rem;}
.quiz-area{margin-top:20px; padding-top:20px; border-top:2px dashed #e2e8f0;}
.opt-btn{display:block; width:100%; padding:12px; margin:8px 0; border:2px solid #eee; border-radius:10px; background:#fff; font-weight:700; cursor:pointer; text-align:left;}
.next-btn{background:var(--mint); color:#fff; margin-top:10px; display:none; font-family:'Fredoka One',cursive; padding:15px; border-radius:15px; border:none; width:100%; cursor:pointer;}
</style>
</head>
<body>

<div class="card">
    <h1>Reading Buddy 📚</h1>
    <h2 id="story-title" style="text-align:center; color:var(--sky);"></h2>
    <div id="story-display" class="story-text"></div>
    
    <button id="mic-btn" class="mic-btn" onclick="toggleMic()">Click to Start Reading 🎤</button>
    
    <div class="transcript-box">
        <b>What I hear:</b><br>
        <span id="live-transcript" style="color:#2563eb;">Waiting for you to speak...</span>
    </div>

    <div id="quiz-area" class="quiz-area" style="display:none;"></div>
    <button id="next-story-btn" class="next-btn" onclick="nextStory()">Next Story ➡️</button>
</div>

<script>
// I have explicitly grouped the questions INSIDE the story object
const ALL_STORIES = [
    {
        title: "The Tall Giraffe",
        text: "The giraffe is very tall. It has a long neck to eat leaves. It lives in the zoo.",
        questions: [
            {q: "What is the giraffe like?", opts: ["Short", "Tall"], a: 1},
            {q: "What does it eat?", opts: ["Leaves", "Pizza"], a: 0}
        ]
    },
    {
        title: "The Busy Bees",
        text: "The bees fly to the flowers. They collect sweet nectar to make honey. We must be careful not to bother them.",
        questions: [
            {q: "What do bees make?", opts: ["Milk", "Honey"], a: 1},
            {q: "Where do they fly?", opts: ["Flowers", "The Moon"], a: 0}
        ]
    }
];

let storyIdx = 0;
let recognition;
let isReading = false;
let cleanTargetWords = [];

function loadStory() {
    const story = ALL_STORIES[storyIdx];
    document.getElementById('story-title').innerText = story.title;
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('next-story-btn').style.display = 'none';
    document.getElementById('live-transcript').innerHTML = "<i>Waiting...</i>";
    
    const words = story.text.split(/\s+/);
    cleanTargetWords = words.map(w => w.replace(/[^\w]/g, "").toLowerCase());
    
    document.getElementById('story-display').innerHTML = words.map((w, i) => 
        `<span id="word-${i}" class="word">${w}</span>`
    ).join(' ');
}

function toggleMic() {
    if (!recognition) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new Speech();
        recognition.continuous = true;
        recognition.interimResults = true;
        
        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = 0; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            
            // UPDATE TRANSCRIPT BOX
            document.getElementById('live-transcript').innerHTML = "<b>" + transcript + "</b>";
            
            // SCORE WORDS
            const spokenWords = transcript.toLowerCase().split(/\s+/);
            spokenWords.forEach(spoken => {
                const s = spoken.replace(/[^\w]/g, "");
                cleanTargetWords.forEach((target, index) => {
                    if (isMatch(s, target)) {
                        document.getElementById(`word-${index}`).className = "word correct";
                    }
                });
            });
        };
    }

    if (isReading) {
        recognition.stop();
        isReading = false;
        document.getElementById('mic-btn').innerText = "Click to Start Reading 🎤";
        document.getElementById('mic-btn').classList.remove('listening');
        showResults();
    } else {
        recognition.start();
        isReading = true;
        document.getElementById('mic-btn').innerText = "I'm Listening... Click to Stop";
        document.getElementById('mic-btn').classList.add('listening');
    }
}

function isMatch(s, t) {
    if (!s || !t) return false;
    if (t.length <= 3) return s === t; // Protects against the "A" bug
    return s === t || s === t + 's' || t === s + 's' || (t.length > 5 && s.startsWith(t.substring(0,4)));
}

function showResults() {
    // Show Quiz
    const quizArea = document.getElementById('quiz-area');
    const story = ALL_STORIES[storyIdx];
    quizArea.innerHTML = "<h3>Quick Quiz!</h3>";
    
    story.questions.forEach((qObj) => {
        const div = document.createElement('div');
        div.innerHTML = `<p><b>${qObj.q}</b></p>`;
        qObj.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => btn.style.background = (i === qObj.a) ? "#dcfce7" : "#fee2e2";
            div.appendChild(btn);
        });
        quizArea.appendChild(div);
    });
    
    quizArea.style.display = 'block';
    document.getElementById('next-story-btn').style.display = 'block';
}

function nextStory() {
    storyIdx = (storyIdx + 1) % ALL_STORIES.length;
    loadStory();
}

loadStory(); // Start first story
</script>

</body>
</html>
