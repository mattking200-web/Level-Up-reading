<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Buddy 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#4ade80; --mint-dark:#16a34a; --sky:#38bdf8; --sky-dark:#0284c7;
  --bg:#f0fdf4; --text:#1e293b; --border:#e2e8f0; --error: #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); padding:16px;}
.container{max-width:700px; margin:0 auto;}
.card{background:#fff; border-radius:24px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,.1); border:2px solid var(--border); margin-bottom:20px;}
h1{font-family:'Fredoka One',cursive; color:var(--mint-dark); text-align:center; margin-bottom:20px;}
.stats{display:flex; justify-content:space-between; margin-bottom:20px; font-weight:800; background:#f8fafc; padding:10px; border-radius:12px;}
.story-text{font-size:1.8rem; line-height:1.8; font-weight:700; margin-bottom:20px; text-align:center;}
.word{display:inline-block; margin-right:8px; color: #cbd5e1; transition: 0.2s;}
.word.correct{color: var(--mint-dark); text-shadow: 1px 1px #dcfce7;}
.word.wrong{color: var(--error); text-decoration: underline wavy var(--error);}
.transcript-box {margin-top: 15px; padding: 10px; background: #f1f5f9; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 0.9rem; color: #475569; min-height: 40px;}
.btn{font-family:'Fredoka One',cursive; padding:15px 25px; border-radius:15px; border:none; cursor:pointer; font-size:1.1rem; width:100%; transition: 0.2s;}
.btn-mic{background:var(--sky); color:#fff; margin-bottom:10px;}
.btn-mic.listening{background:var(--error); animation: pulse 1.5s infinite;}
.btn-next{background:var(--mint); color:#fff; display:none;}
@keyframes pulse{ 0%{opacity:1;} 50%{opacity:0.7;} 100%{opacity:1;} }
.opt-btn{display:block; width:100%; padding:12px; margin:8px 0; border:2px solid #e2e8f0; border-radius:12px; background:#fff; font-weight:700; cursor:pointer; text-align:left;}
</style>
</head>
<body>

<div class="container">
    <h1>Reading Buddy 📚</h1>
    <div class="card">
        <div class="stats">
            <div>Level: <span id="lvl-display">AA</span></div>
            <div>Streak: <span id="streak-display">0</span>/2</div>
        </div>

        <div id="setup-view">
            <label><b>Choose Your Level:</b></label>
            <select id="lvl-select" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; font-size:1rem;"></select>
            <button class="btn btn-mic" onclick="startApp()">Start Reading 🚀</button>
        </div>

        <div id="reading-view" style="display:none;">
            <h2 id="story-title" style="text-align:center; color:var(--sky-dark); margin-bottom:10px;"></h2>
            <div id="story-display" class="story-text"></div>
            <button id="mic-btn" class="btn btn-mic" onclick="toggleMic()">Click to Speak 🎤</button>
            <div class="transcript-box"><b>What I heard:</b> <span id="live-transcript">...</span></div>
            <div id="accuracy-display" style="text-align:center; font-weight:900; margin:10px;"></div>
            <button id="next-btn" class="btn btn-next" onclick="nextStory()">Next Story ➡️</button>
        </div>
        <div id="quiz-view" style="display:none; margin-top:20px; border-top:2px dashed #e2e8f0; padding-top:20px;"></div>
    </div>
</div>

<script>
const STORIES = {
  AA: [
    { title:"The Cat", text:"I see a cat. The cat is big. I like the cat.", q:[{q:"What does the child see?",opts:["A dog","A cat","A bird"],a:1},{q:"What size is the cat?",opts:["Small","Tiny","Big"],a:2}] },
    { title:"My Dog", text:"My dog is red. My dog can run. I love my dog.", q:[{q:"What color is the dog?",opts:["Blue","Red","Green"],a:1},{q:"What can the dog do?",opts:["Fly","Run","Sing"],a:1}] }
  ],
  A: [
    { title:"I Can Jump", text:"I can jump. I can run. I can play. It is fun.", q:[{q:"What can the child do?",opts:["Swim","Jump","Fly"],a:1},{q:"How is playing?",opts:["Hard","Boring","Fun"],a:2}] }
  ],
  B: [
    { title:"At the Park", text:"I like to go to the park. I can play on the slide. The slide is very fast.", q:[{q:"Where does the child go?",opts:["The store","The park","School"],a:1}] }
  ],
  C: [
    { title:"The Tall Giraffe", text:"The giraffe is very tall. It has a long neck to eat leaves. It lives in the zoo.", q:[{q:"What is the giraffe like?",opts:["Short","Tall","Fat"],a:1}] }
  ],
  D: [
    { title:"The Busy Bees", text:"The bees fly to the flowers. They collect sweet nectar to make honey. We must be careful not to bother them.", q:[{q:"Where do the bees fly?",opts:["To the hive","To the flowers","To the trees"],a:1},{q:"What do they make?",opts:["Milk","Honey","Juice"],a:1}] },
    { title:"A Trip to Space", text:"Astronauts travel in a big rocket. They go to the moon and look at Earth. Everything looks very small from up there.", q:[{q:"What do they travel in?",opts:["A plane","A rocket","A car"],a:1}] }
  ]
};

let currentLevel = "AA", storyIdx = 0, streak = 0, recognition, isListening = false;
let pointer = 0, correctCount = 0, processedWordCount = 0;

const select = document.getElementById('lvl-select');
Object.keys(STORIES).forEach(lvl => {
    let opt = document.createElement('option'); opt.value = lvl; opt.textContent = "Level " + lvl; select.appendChild(opt);
});

function startApp() {
    currentLevel = select.value; storyIdx = 0;
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('reading-view').style.display = 'block';
    loadStory();
}

function loadStory() {
    const story = STORIES[currentLevel][storyIdx];
    document.getElementById('story-title').textContent = story.title;
    document.getElementById('lvl-display').textContent = currentLevel;
    document.getElementById('streak-display').textContent = streak;
    document.getElementById('accuracy-display').textContent = "";
    document.getElementById('live-transcript').textContent = "...";
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('mic-btn').style.display = 'block';
    
    pointer = 0; correctCount = 0; processedWordCount = 0;
    const display = document.getElementById('story-display');
    const words = story.text.trim().split(/\s+/);
    display.innerHTML = words.map((w, i) => `<span id="word-${i}" class="word">${w}</span>`).join(' ');
}

function toggleMic() {
    if (!recognition) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new Speech();
        recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let fullTranscript = "";
            for (let i = 0; i < event.results.length; i++) {
                fullTranscript += event.results[i][0].transcript.toLowerCase() + " ";
            }
            document.getElementById('live-transcript').textContent = fullTranscript;
            const spokenArray = fullTranscript.trim().split(/\s+/).map(w => cleanWord(w));
            
            while (processedWordCount < spokenArray.length) {
                deepSearchProcess(spokenArray[processedWordCount]);
                processedWordCount++;
            }
        };
    }

    if (isListening) {
        recognition.stop(); isListening = false;
        document.getElementById('mic-btn').className = "btn btn-mic";
        document.getElementById('mic-btn').textContent = "Click to Speak 🎤";
        finishReading();
    } else {
        recognition.start(); isListening = true;
        document.getElementById('mic-btn').className = "btn btn-mic listening";
        document.getElementById('mic-btn').textContent = "Stop & Check ⏹️";
    }
}

function cleanWord(w) {
    // Aggressively remove punctuation and special spacing characters
    return w.replace(/[^\w\s]|_/g, "").toLowerCase().trim();
}

function isMatch(spoken, storyWord) {
    if (!spoken || !storyWord) return false;
    if (spoken === storyWord) return true;
    if (spoken + 's' === storyWord || storyWord + 's' === spoken) return true;
    
    // Fuzzy matching for 80% similarity
    let matches = 0;
    for (let i = 0; i < Math.min(spoken.length, storyWord.length); i++) {
        if (spoken[i] === storyWord[i]) matches++;
    }
    return (matches / storyWord.length) >= 0.8;
}

function deepSearchProcess(spoken) {
    const storyWords = STORIES[currentLevel][storyIdx].text.split(/\s+/).map(w => cleanWord(w));
    
    // Look ahead through the ENTIRE rest of the story to find the word
    let foundAt = -1;
    for (let i = pointer; i < storyWords.length; i++) {
        if (isMatch(spoken, storyWords[i])) {
            foundAt = i;
            break;
        }
    }

    if (foundAt !== -1) {
        // Mark everything between current pointer and the found word as "wrong"
        for (let j = pointer; j < foundAt; j++) {
            markWord(j, 'wrong');
        }
        // Mark the found word as "correct"
        markWord(foundAt, 'correct');
        pointer = foundAt + 1;
        correctCount++;
    }
}

function markWord(idx, status) {
    const el = document.getElementById(`word-${idx}`);
    if (el && !el.classList.contains('correct')) {
        // Once a word is correct, we don't overwrite it with wrong
        if (status === 'wrong' && el.classList.contains('wrong')) return;
        el.className = `word ${status}`;
    }
}

function finishReading() {
    const words = STORIES[currentLevel][storyIdx].text.trim().split(/\s+/);
    for (let i = 0; i < words.length; i++) {
        const el = document.getElementById(`word-${i}`);
        if (!el.classList.contains('correct')) el.classList.add('wrong');
    }
    
    const accuracy = Math.round((correctCount / words.length) * 100);
    const display = document.getElementById('accuracy-display');
    display.textContent = `Accuracy: ${accuracy}%`;
    if (accuracy >= 80) streak++; else streak = 0;
    document.getElementById('streak-display').textContent = streak;
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
    showQuiz();
}

function showQuiz() {
    const quizView = document.getElementById('quiz-view');
    quizView.innerHTML = "<h3>Great Work!</h3>";
    quizView.style.display = 'block';
    const story = STORIES[currentLevel][storyIdx];
    story.q.forEach((qObj, qi) => {
        const div = document.createElement('div');
        div.innerHTML = `<p><b>${qObj.q}</b></p>`;
        qObj.opts.forEach((opt, oi) => {
            const b = document.createElement('button'); b.className="opt-btn"; b.textContent = opt;
            b.onclick = () => { b.style.background = (oi === qObj.a) ? "#dcfce7" : "#fee2e2"; };
            div.appendChild(b);
        });
        quizView.appendChild(div);
    });
}

function nextStory() {
    storyIdx = (storyIdx + 1) % STORIES[currentLevel].length;
    loadStory();
}
</script>
</body>
</html>
